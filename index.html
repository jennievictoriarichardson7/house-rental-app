<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeRent USA | Find Your Perfect Home</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">

    <div class="logo">
        HomeRent USA
    </div>

    <nav>

        <a href="#">Home</a>

        <a href="#">Properties</a>

        <a href="#">Apply</a>

        <a href="#">Contact</a>

    </nav>

</header>

<section class="hero">
    <section class="featured">

    <h2>Featured Properties</h2>

    <div class="property-grid">

        <div class="property-card">
            <img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&w=800&q=80" alt="House">

            <div class="property-info">

                <h3>$2,450 / Month</h3>

                <p>3 Bed • 2 Bath • Dallas, TX</p>

                <button>View Details</button>

            </div>

        </div>

        <div class="property-card">
            <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?auto=format&fit=crop&w=800&q=80" alt="House">

            <div class="property-info">

                <h3>$1,850 / Month</h3>

                <p>2 Bed • 2 Bath • Miami, FL</p>

                <button>View Details</button>

            </div>

        </div>

        <div class="property-card">
            <img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&w=800&q=80" alt="House">

            <div class="property-info">

                <h3>$3,150 / Month</h3>

                <p>4 Bed • 3 Bath • Phoenix, AZ</p>

                <button>View Details</button>

            </div>

        </div>

    </div>

</section>

    <div class="hero-content">

        <h1>Find Your Dream Rental Home</h1>

        <p>
            Browse thousands of verified rental homes across the United States.
        </p>

        <button>Find Properties</button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
